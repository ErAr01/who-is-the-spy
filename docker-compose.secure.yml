  #     - certbot-webroot:/var/www/certbot:ro
  #   depends_on:
  #     - grafana
  #     - prometheus
  #   restart: unless-stopped
  #   healthcheck:
  #     test: ["CMD", "wget", "--spider", "-q", "http://localhost/health"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 3

  # certbot:
  #   image: certbot/certbot:v3.0.1
  #   profiles:
  #     - observability
  #   volumes:
  #     - ./deploy/nginx/ssl:/etc/letsencrypt
  #     - certbot-webroot:/var/www/certbot
  #   entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done"

volumes:
  redis-data:
    driver: local
  prometheus-data:
    driver: local
  loki-data:
    driver: local
  promtail-positions:
    driver: local
  grafana-data:
    driver: local
  # certbot-webroot:
  #   driver: local

# 📋 Чеклист перед запуском:
# 1. Создайте .env с REDIS_PASSWORD и GRAFANA_ADMIN_PASSWORD
# 2. Убедитесь, что UFW настроен (sudo ufw status)
# 3. Выполните: docker compose -f docker-compose.secure.yml --profile observability up -d
# 4. Проверьте: curl http://localhost:3000 (должно работать на сервере)
# 5. Проверьте: curl http://<PUBLIC_IP>:3000 (должно отваливаться извне)
