# Nginx конфигурация для Варианта Б (Reverse Proxy с SSL и Basic Auth)
# 📚 Что здесь происходит:
# Nginx выступает единой точкой входа для всех observability-сервисов.
# Каждый сервис доступен через отдельный поддомен с SSL-шифрованием и HTTP Basic Auth.
# Rate limiting защищает от brute-force атак на endpoints аутентификации.

events {
    worker_connections 1024;
}

http {
    # 🔒 Rate limiting для защиты от brute-force
    # Зона auth_limit: максимум 5 запросов в минуту с одного IP на login endpoints
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;
    
    # 🔒 Базовые заголовки безопасности
    server_tokens off;  # Скрыть версию Nginx
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Логирование неуспешных попыток аутентификации
    log_format auth_fail '$remote_addr - $remote_user [$time_local] '
                         '"$request" $status $body_bytes_sent '
                         '"$http_user_agent" auth_failed';

    # ============================================================
    # Grafana — главный интерфейс для мониторинга
    # ============================================================
    
    server {
        listen 80;
        server_name grafana.your-domain.com;
        
        # Редирект на HTTPS для безопасности
        location / {
            return 301 https://$host$request_uri;
        }
        
        # Исключение для Let's Encrypt ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }
    }

    server {
        listen 443 ssl http2;
        server_name grafana.your-domain.com;

        # 🔒 SSL-сертификаты от Let's Encrypt
        ssl_certificate /etc/letsencrypt/live/grafana.your-domain.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/grafana.your-domain.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
        ssl_prefer_server_ciphers off;

        # 🔒 Basic Auth — первый уровень защиты (перед Grafana login)
        auth_basic "Restricted Access - Observability Stack";
        auth_basic_user_file /etc/nginx/.htpasswd;
        
        # Логирование неуспешных попыток
        access_log /var/log/nginx/grafana_access.log combined;
        access_log /var/log/nginx/grafana_auth_fail.log auth_fail if=$auth_fail;
        
        # 🔒 Rate limiting на login endpoints для защиты от brute-force
        location ~ ^/(login|api/login) {
            limit_req zone=auth_limit burst=3 nodelay;
            proxy_pass http://grafana:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            proxy_pass http://grafana:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # 📚 WebSocket support для Grafana Live (реал-тайм обновления дашбордов)
            # Без этого Grafana Live не будет работать корректно
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            # Таймауты для длинных запросов
            proxy_read_timeout 90s;
            proxy_connect_timeout 90s;
        }
        
        # Health check endpoint без аутентификации (для мониторинга)
        location /api/health {
            auth_basic off;
            proxy_pass http://grafana:3000/api/health;
        }
        
        # Трекинг неуспешных аутентификаций
        set $auth_fail 0;
        if ($status = 401) {
            set $auth_fail 1;
        }
    }

    # ============================================================
    # Prometheus — метрики
    # ============================================================
    
    server {
        listen 80;
        server_name prometheus.your-domain.com;
        
        location / {
            return 301 https://$host$request_uri;
        }
        
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }
    }

    server {
        listen 443 ssl http2;
        server_name prometheus.your-domain.com;

        ssl_certificate /etc/letsencrypt/live/prometheus.your-domain.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/prometheus.your-domain.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';

        auth_basic "Restricted Access - Prometheus";
        auth_basic_user_file /etc/nginx/.htpasswd;

        access_log /var/log/nginx/prometheus_access.log combined;

        location / {
            proxy_pass http://prometheus:9090;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # 📚 Prometheus UI использует много статических ресурсов — увеличиваем таймауты
            proxy_read_timeout 300s;
            proxy_connect_timeout 300s;
        }
        
        # Health check без аутентификации
        location /-/healthy {
            auth_basic off;
            proxy_pass http://prometheus:9090/-/healthy;
        }
    }

    # ============================================================
    # Loki — логи (опционально, обычно используется только через Grafana)
    # ============================================================
    
    server {
        listen 80;
        server_name loki.your-domain.com;
        
        location / {
            return 301 https://$host$request_uri;
        }
        
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }
    }

    server {
        listen 443 ssl http2;
        server_name loki.your-domain.com;

        ssl_certificate /etc/letsencrypt/live/loki.your-domain.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/loki.your-domain.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';

        auth_basic "Restricted Access - Loki";
        auth_basic_user_file /etc/nginx/.htpasswd;

        access_log /var/log/nginx/loki_access.log combined;

        location / {
            proxy_pass http://loki:3100;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # 📚 Loki может отправлять большие объемы логов — увеличиваем лимиты
            client_max_body_size 10M;
            proxy_read_timeout 300s;
        }
        
        # Health check без аутентификации
        location /ready {
            auth_basic off;
            proxy_pass http://loki:3100/ready;
        }
    }

    # ============================================================
    # Альтернативная конфигурация: один домен, разные пути
    # Используйте этот вариант, если у вас только один домен
    # ============================================================
    
    # server {
    #     listen 443 ssl http2;
    #     server_name observability.your-domain.com;
    #
    #     ssl_certificate /etc/letsencrypt/live/observability.your-domain.com/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/observability.your-domain.com/privkey.pem;
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #
    #     auth_basic "Restricted Access";
    #     auth_basic_user_file /etc/nginx/.htpasswd;
    #
    #     # Grafana на корневом пути
    #     location / {
    #         proxy_pass http://grafana:3000;
    #         proxy_set_header Host $host;
    #         proxy_http_version 1.1;
    #         proxy_set_header Upgrade $http_upgrade;
    #         proxy_set_header Connection "upgrade";
    #     }
    #
    #     # Prometheus на /prometheus
    #     location /prometheus/ {
    #         proxy_pass http://prometheus:9090/;
    #         proxy_set_header Host $host;
    #     }
    #
    #     # Loki на /loki
    #     location /loki/ {
    #         proxy_pass http://loki:3100/;
    #         proxy_set_header Host $host;
    #     }
    # }
}

# ⚠️ Важно знать:
# 1. Замените "your-domain.com" на ваш реальный домен
# 2. Сначала получите SSL-сертификаты через Certbot (см. SECURITY.md)
# 3. Создайте .htpasswd файл: htpasswd -c /path/to/.htpasswd admin
# 4. Протестируйте конфиг: docker compose exec nginx nginx -t
# 5. Перезагрузите Nginx: docker compose restart nginx
