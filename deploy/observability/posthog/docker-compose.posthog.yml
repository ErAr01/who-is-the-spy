services:
  posthog-db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTHOG_DB_USER:-posthog}
      POSTGRES_PASSWORD: ${POSTHOG_DB_PASSWORD:-posthog}
      POSTGRES_DB: ${POSTHOG_DB_NAME:-posthog}
    volumes:
      - posthog-db-data:/var/lib/postgresql/data

  posthog-redis:
    image: redis:7-alpine
    restart: unless-stopped

  posthog:
    image: posthog/posthog:latest
    depends_on:
      - posthog-db
      - posthog-redis
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTHOG_DB_USER:-posthog}:${POSTHOG_DB_PASSWORD:-posthog}@posthog-db:5432/${POSTHOG_DB_NAME:-posthog}
      REDIS_URL: redis://posthog-redis:6379/
      SECRET_KEY: ${POSTHOG_SECRET_KEY:-change-me-in-production}
      SITE_URL: ${POSTHOG_SITE_URL:-http://localhost:8000}
      IS_BEHIND_PROXY: "0"
      DISABLE_SECURE_SSL_REDIRECT: "1"
    command: /bin/sh -c "./bin/migrate && ./bin/docker-server"
    ports:
      - "${POSTHOG_PORT:-8000}:8000"

volumes:
  posthog-db-data:
