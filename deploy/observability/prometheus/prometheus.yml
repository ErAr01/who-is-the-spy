global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/game-observability-rules.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: bot
    metrics_path: /metrics
    static_configs:
      - targets:
          - bot:8001

  - job_name: loki
    metrics_path: /metrics
    static_configs:
      - targets:
          - loki:3100
